name: AliExpress Auto Collect Coins

on:
  schedule:
    # ירוץ בכל יום בשעה 02:00 בלילה (לפי שעון UTC)
    - cron: '0 2 * * *'
  workflow_dispatch: # מאפשר לך להפעיל ידנית לניסיון בכל רגע

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Google Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install dependencies
      run: |
        # אם הקובץ נקרא "דרישות.txt", שנה את השורה למטה בהתאם
        pip install -r requirements.txt || pip install -r דרישות.txt

    - name: Run Collector
      env:
        # אלו השמות המדויקים שהסקריפט שלך מחפש (לפי הודעת השגיאה הקודמת)
        ALIEXPRESS_EMAIL: ${{ secrets.ALIEXPRESS_EMAIL }}
        ALIEXPRESS_PASSWORD: ${{ secrets.ALIEXPRESS_PASSWORD }}
      run: python collect_coins.py
