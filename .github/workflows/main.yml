name: AliExpress Auto Collect Coins

on:
  schedule:
    # רץ כל יום בשעה 02:00 בלילה (זמן UTC)
    - cron: '0 2 * * *'
  workflow_dispatch: # מאפשר לך להריץ ידנית בלחיצת כפתור

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install selenium python-dotenv

    - name: Run Collector
      env:
        # כאן אנחנו מחברים את ה-Secrets שהגדרת בגיטהאב לקוד הפייתון
        ALIEXPRESS_EMAIL: ${{ secrets.ALIEXPRESS_EMAIL }}
        ALIEXPRESS_PASSWORD: ${{ secrets.ALIEXPRESS_PASSWORD }}
        ALIE_COOKIE: ${{ secrets.ALIE_COOKIE }}
      run: python collect_coins.py

    - name: Upload Screenshot on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failure-screenshot
        path: "*.png"
