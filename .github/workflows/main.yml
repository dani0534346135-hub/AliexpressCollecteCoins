name: AliExpress Auto Collect Coins

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Chrome and Driver
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable chromium-chromedriver

    - name: Install dependencies
      run: |
        pip install -r requirements.txt || pip install -r דרישות.txt
        # התקנת ספרייה שעוזרת ללינוקס לנהל תצוגה "וירטואלית"
        pip install pyvirtualdisplay 

    - name: Run Collector
      env:
        ALIEXPRESS_EMAIL: ${{ secrets.ALIEXPRESS_EMAIL }}
        ALIEXPRESS_PASSWORD: ${{ secrets.ALIEXPRESS_PASSWORD }}
        # פקודה שאומרת לסקריפט לרוץ בלי לנסות לפתוח חלון גרפי
        PYTHONPATH: .
      run: python collect_coins.py
